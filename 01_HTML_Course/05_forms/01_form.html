<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forms in HTML</title>
</head>
<body>
  <!-- 1st Example  -->
  <form>
    <h1>Form Type 1</h1>
    <input type="text" placeholder="User Name" />
    <br /><br />

    <input type="password" placeholder="Password" />
    <br /><br>

    <input type="text & password" placeholder="User Name & Password" />
    <br /><br />
    <hr />
  </form>

  <!-- 2nd Example -->
  <form>
    <h1>Form Type 2</h1>
    <label>
      Enter Email:-
      <input type="text" id="email" />
    </label>
    <br /><br />

    <label for="pass">Enter Password:-</label>
    <input type="password" id="pass" />
    <br /><br />

    <input type="submit" value="click here" />
    <br /><br>
    <hr />
  </form>

  <!-- Input Types Example -->
  <h1>Example of Input types</h1>
  <input type="button" value="Button" />
  <br />

  <input type="checkbox" />
  <br />

  <input type="color" />
  <br />

  <input type="date" />
  <br />

  <input type="week" />
  <br />

  <input type="email" />
  <br />

  <input type="file" />
  <br />

  <input type="hidden" />
  <br />

  <input type="number" />
  <br />

  <input type="password" />
  <br />

  <input type="radio" />
  <br />

  <input type="range" />
  <br />

  <input type="reset" />
  <br />

  <input type="submit" />
  <br />

  <input type="text" />
  <br />

  <input type="url" />
  <br />

  <input type="datetime-local" />
  <br />

  <input type="month" />
  <br />

  <input type="search" />
  <br />

  <input type="time" />
  <br />

  <input type="tel" />
  <br />

  <input type="image" />
  <br />
  <hr />


  <h1>Real time Example</h1>
  <form>
    <label for="email">Enter Email Id:-</label>
    <input type="text" id="email" placeholder="Enter Your Email" />
    <br /><br />

    <label for="passw">Enter Password:-</label>
    <input type="password" id="passw" placeholder="Enter Your Password" />
    <br /><br />

    <input type="submit" value="click here" />
    <br /><br />
  </form>

  <!-- Example pratice -->
  <form>
    <label for="name">Enter Your Name:-</label>
    <input type="text" name="name" id="name" />
    <br /><br>

    <label for="emailid">Enter Your Email:-</label>
    <input type="email" name="email" id="emailid" />
    <br><br>

    <input type="submit" value="Subscribe!" />
  </form>

</body>
</html>
