<!DOCTYPE html>
<html lang="en">
<head>
  <title>Form Pratice-1</title>
</head>
<body>
  <h2>Event Registration</h2>
  <form>
    <label for="name">User Name:-</label>
    <input type="text" id="name" name="name" />
    <br /><br />

    <label for="emailid">Email Id:-</label>
    <input type="email" id="emailid" name="emailid" />
    <br /><br />

    <label for="phone">Phone No:-</label>
    <input type="tel" id="phone" name="phone number" />
    <br /><br />

    <label for="Occupation Type">Occupation:-</label>
    <select name="Occupation" id="Occupation Type">
      <option value="Others">Others</option>
      <option value="Professional">Professional</option>
      <option value="Students">Students</option>
    </select>
  </form>
  <br><br>

  <fieldset>
    <legend>Topic of Interest</legend>
    <label for="checkbox1">HTML</label>
    <input type="checkbox" name="checkbox1" id="checkbox1" />

    <label for="checkbox2">CSS</label>
    <input type="checkbox" name="checkbox2" id="checkbox2" />

    <label for="checkbox3">JavaScripts</label>
    <input type="checkbox" name="checkbox3" id="checkbox3" />
  </fieldset>
  <br>

  <form>
    <label for="textarea1">Comments</label>
    <br />
    <textarea name="textarea1" id="textarea1" cols="30" rows="10"></textarea>
    <button>Register</button>
  </form>

</body>
</html>
